<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
#app{max-width:960px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.header{background:#fff;border-radius:14px;border:1px solid #e8e8e0;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;transition:background 0.12s;}
.btn:hover{background:#f5f5f0;}
.btn.primary{background:#1D9E75;border-color:#1D9E75;color:#fff;}
.btn.primary:hover{background:#0F6E56;}
.btn.sm{padding:6px 12px;font-size:13px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem;}
.stat{background:#fff;border-radius:12px;border:1px solid #e8e8e0;padding:1rem;}
.stat-lbl{font-size:12px;color:#aaa;font-weight:500;margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:700;}
.card{background:#fff;border-radius:14px;border:1px solid #e8e8e0;padding:1.25rem;margin-bottom:1rem;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:560px;}
th{text-align:left;font-size:11px;font-weight:600;color:#aaa;padding:0 10px 10px;text-transform:uppercase;letter-spacing:0.04em;}
td{padding:12px 10px;border-top:1px solid #f0f0ea;vertical-align:middle;}
tr:hover td{background:#fafaf7;}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.ex{background:#E1F5EE;color:#085041;}.go{background:#E6F1FB;color:#0C447C;}.sa{background:#FAEEDA;color:#633806;}.ni{background:#fdf0ef;color:#c0392b;}
.panel{background:#f9f9f6;border-radius:10px;padding:1rem;display:none;border:1px solid #f0f0ea;margin-top:4px;}
.panel.open{display:block;}
.dq{font-size:12px;color:#888;margin-bottom:3px;margin-top:8px;}
.dq:first-child{margin-top:0;}
.da{font-size:14px;color:#1a1a1a;line-height:1.5;}
.br{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:4px;}
.br.ok{background:#E1F5EE;color:#085041;}.br.no{background:#fdf0ef;color:#c0392b;}.br.op{background:#E6F1FB;color:#0C447C;}.br.sk{background:#f5f5f0;color:#888;}
.spinner{width:32px;height:32px;border:3px solid #e8e8e0;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px;}
.login-wrap{max-width:360px;margin:4rem auto;background:#fff;border-radius:16px;border:1px solid #e8e8e0;padding:2rem;text-align:center;}
input[type=password]{width:100%;border:1px solid #ddd;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;margin-bottom:1rem;}
input[type=password]:focus{border-color:#1D9E75;}
.err{font-size:13px;color:#c0392b;margin-top:6px;display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="login">
    <div class="login-wrap">
      <div style="font-size:36px;margin-bottom:1rem;">🔐</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:6px;">Teacher dashboard</div>
      <div style="font-size:14px;color:#888;margin-bottom:1.5rem;">Enter password to view student results</div>
      <input type="password" id="pwd" placeholder="Password..." onkeydown="if(event.key==='Enter')auth()"/>
      <button class="btn primary" style="width:100%;" onclick="auth()">Enter</button>
      <div class="err" id="err">Incorrect password</div>
    </div>
  </div>
  <div id="dash" style="display:none;">
    <div class="header">
      <div>
        <div style="font-size:18px;font-weight:700;">Project Management — Results</div>
        <div style="font-size:13px;color:#aaa;margin-top:2px;" id="refresh-time"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn sm" onclick="load()">↻ Refresh</button>
        <button class="btn sm primary" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:1rem;">All submissions</div>
      <div id="tbl"></div>
    </div>
  </div>
</div>
<script>
const URL_='https://zlykfsiglfcddzaadrca.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpseWtmc2lnbGZjZGR6YWFkcmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDE4NTAsImV4cCI6MjA5MDk3Nzg1MH0.zpWos9F4jQItsGaMVNOlEQdW93LciDaEAI-YPSRQfzM';
const PWD='teamsystems2026';
let data=[];

function auth(){
  if(document.getElementById('pwd').value===PWD){
    document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block';
    load();
  }else{
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';
  }
}

async function load(){
  document.getElementById('tbl').innerHTML='<div class="spinner"></div>';
  try{
    const r=await fetch(URL_+'/rest/v1/results?select=*&order=submitted_at.desc',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    data=await r.json();
    render();
    document.getElementById('refresh-time').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('tbl').innerHTML='<div class="empty">Could not load results.</div>';
  }
}

function grade(p){return p>=90?['Excellent','ex']:p>=75?['Good','go']:p>=60?['Satisfactory','sa']:['Needs improvement','ni'];}

function render(){
  if(!data.length){
    document.getElementById('stats').innerHTML='';
    document.getElementById('tbl').innerHTML='<div class="empty">No submissions yet. Share the exam link with students!</div>';
    return;
  }
  const avg=Math.round(data.reduce((s,r)=>s+r.percentage,0)/data.length);
  const passed=data.filter(r=>r.percentage>=60).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Submissions</div><div class="stat-val">${data.length}</div></div>
    <div class="stat"><div class="stat-lbl">Average</div><div class="stat-val">${avg}%</div></div>
    <div class="stat"><div class="stat-lbl">Pass rate</div><div class="stat-val">${Math.round(passed/data.length*100)}%</div></div>
    <div class="stat"><div class="stat-lbl">Highest</div><div class="stat-val">${Math.max(...data.map(r=>r.percentage))}%</div></div>
    <div class="stat"><div class="stat-lbl">Lowest</div><div class="stat-val">${Math.min(...data.map(r=>r.percentage))}%</div></div>
  `;
  let rows=data.map((r,i)=>{
    const [g,cls]=grade(r.percentage);
    const dt=new Date(r.submitted_at).toLocaleString([],{dateStyle:'short',timeStyle:'short'});
    const ans=r.answers||[];
    let detail='';
    ans.forEach(a=>{
      if(a.type==='mc'){
        detail+=`<div class="dq">Q${a.qnum}: ${a.question}<span class="br ${a.correct?'ok':'no'}">${a.correct?'✓':'✗ '+a.correctAnswer}</span></div><div class="da">${a.answer}</div>`;
      }else{
        const b=a.answer!=='(skipped)'?'<span class="br op">open</span>':'<span class="br sk">skipped</span>';
        detail+=`<div class="dq">Q${a.qnum}: ${a.question}${b}</div><div class="da">${a.answer}</div>`;
      }
    });
    return `<tr>
      <td><strong>${r.student_name}</strong></td>
      <td>${r.score_mc}/${r.total_mc}</td>
      <td>${r.percentage}%</td>
      <td><span class="pill ${cls}">${g}</span></td>
      <td style="color:#aaa;font-size:13px;">${dt}</td>
      <td><button class="btn sm" onclick="toggle('p${i}')">Details</button></td>
    </tr>
    <tr style="background:transparent;"><td colspan="6" style="padding:0 10px 4px;"><div class="panel" id="p${i}">${detail}</div></td></tr>`;
  }).join('');
  document.getElementById('tbl').innerHTML=`<table><thead><tr><th>Student</th><th>Score</th><th>%</th><th>Grade</th><th>Submitted</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function toggle(id){document.getElementById(id).classList.toggle('open');}

function exportCSV(){
  if(!data.length)return;
  let csv='Student,Score,Percentage,Grade,Submitted\n';
  data.forEach(r=>{
    const [g]=grade(r.percentage);
    csv+=`"${r.student_name}",${r.score_mc}/${r.total_mc},${r.percentage}%,"${g}","${new Date(r.submitted_at).toLocaleString()}"\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='exam-results.csv';a.click();
}
</script>
</body>
</html>
