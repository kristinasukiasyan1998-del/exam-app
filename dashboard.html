<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Dashboard — Project Management Exam</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
#app{max-width:980px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.header{background:#fff;border-radius:14px;border:1px solid #e8e8e0;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;transition:background 0.12s;text-decoration:none;}
.btn:hover{background:#f5f5f0;}
.btn.primary{background:#1D9E75;border-color:#1D9E75;color:#fff;}
.btn.primary:hover{background:#0F6E56;}
.btn.blue{background:#378ADD;border-color:#378ADD;color:#fff;}
.btn.blue:hover{background:#185FA5;}
.btn.sm{padding:6px 12px;font-size:13px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem;}
.stat{background:#fff;border-radius:12px;border:1px solid #e8e8e0;padding:1rem;}
.stat-lbl{font-size:12px;color:#aaa;font-weight:500;margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:700;color:#1a1a1a;}
.stat-val.green{color:#1D9E75;}
.card{background:#fff;border-radius:14px;border:1px solid #e8e8e0;padding:1.25rem;margin-bottom:1rem;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:660px;}
th{text-align:left;font-size:11px;font-weight:600;color:#aaa;padding:0 10px 10px;text-transform:uppercase;letter-spacing:0.04em;}
td{padding:12px 10px;border-top:1px solid #f0f0ea;vertical-align:middle;}
tr:hover td{background:#fafaf7;}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.ex{background:#E1F5EE;color:#085041;}
.go{background:#E6F1FB;color:#0C447C;}
.sa{background:#FAEEDA;color:#633806;}
.ni{background:#fdf0ef;color:#c0392b;}
.pending{background:#f5f5f0;color:#888;}
.panel{display:none;background:#f9f9f6;border-radius:10px;padding:1rem;border:1px solid #f0f0ea;margin-top:4px;}
.panel.open{display:block;}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#aaa;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #e8e8e0;}
.sec-title:first-child{margin-top:0;}
.ans-row{margin-bottom:10px;}
.ans-q{font-size:12px;color:#888;margin-bottom:3px;}
.ans-a{font-size:14px;color:#1a1a1a;line-height:1.5;background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #e8e8e0;}
.br{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:4px;}
.br.ok{background:#E1F5EE;color:#085041;}
.br.no{background:#fdf0ef;color:#c0392b;}
.br.op{background:#E6F1FB;color:#0C447C;}
.br.sk{background:#f5f5f0;color:#888;}
.grade-row{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;}
.grade-row label{font-size:12px;color:#555;font-weight:500;}
.si{width:58px;border:1px solid #ddd;border-radius:8px;padding:5px 8px;font-size:15px;font-weight:600;text-align:center;outline:none;font-family:inherit;}
.si:focus{border-color:#1D9E75;}
.si:disabled{background:#f5f5f0;color:#aaa;cursor:not-allowed;}
.flash{font-size:12px;color:#1D9E75;display:none;}
.score-box{margin-top:12px;background:#fff;border-radius:10px;border:1px solid #e8e8e0;padding:12px;}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:13px;margin-bottom:10px;}
.score-grid div{color:#888;}
.score-grid strong{color:#1a1a1a;}
.bar-bg{background:#f0f0ea;border-radius:99px;height:8px;flex:1;}
.bar-fill{border-radius:99px;height:8px;transition:width 0.35s;}
.bar-row{display:flex;gap:10px;align-items:center;}
.bar-pct{font-size:13px;font-weight:600;min-width:44px;text-align:right;}
.save-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.notice{background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;padding:10px 14px;font-size:13px;color:#633806;margin-bottom:1.5rem;display:none;}
.dot{width:8px;height:8px;border-radius:50%;background:#EF9F27;display:inline-block;margin-right:4px;vertical-align:middle;}
.login-wrap{max-width:360px;margin:4rem auto;background:#fff;border-radius:16px;border:1px solid #e8e8e0;padding:2rem;text-align:center;}
input[type=password]{width:100%;border:1px solid #ddd;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;margin-bottom:1rem;}
input[type=password]:focus{border-color:#1D9E75;}
.err{font-size:13px;color:#c0392b;margin-top:6px;display:none;}
.spinner{width:32px;height:32px;border:3px solid #e8e8e0;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px;}
</style>
</head>
<body>
<div id="app">

<div id="login">
  <div class="login-wrap">
    <div style="font-size:36px;margin-bottom:1rem;">🔐</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:6px;">Teacher dashboard</div>
    <div style="font-size:14px;color:#888;margin-bottom:1.5rem;">Enter password to view and grade results</div>
    <input type="password" id="pwd" placeholder="Password..." onkeydown="if(event.key==='Enter')auth()"/>
    <button class="btn primary" style="width:100%;padding:12px;" onclick="auth()">Enter</button>
    <div class="err" id="err">Incorrect password</div>
  </div>
</div>

<div id="dash" style="display:none;">
  <div class="header">
    <div>
      <div style="font-size:18px;font-weight:700;">Project Management — Results</div>
      <div style="font-size:13px;color:#aaa;margin-top:2px;" id="refresh-time"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn sm" onclick="load()">↻ Refresh</button>
      <button class="btn sm primary" onclick="exportCSV()">Export CSV</button>
      <a href="/" class="btn sm">← Exam</a>
    </div>
  </div>

  <div class="notice" id="notice"><span class="dot"></span><strong>Grading needed:</strong> Some students have ungraded open answers. Click "Grade" to score them.</div>

  <div class="stats" id="stats"></div>

  <div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px;">All submissions</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:1rem;">Section A (MC) = 20 pts &nbsp;·&nbsp; Section B (Open) = 50 pts &nbsp;·&nbsp; Total = 70 pts</div>
    <div id="tbl"></div>
  </div>
</div>
</div>

<script>
const SUPA='https://zlykfsiglfcddzaadrca.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpseWtmc2lnbGZjZGR6YWFkcmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDE4NTAsImV4cCI6MjA5MDk3Nzg1MH0.zpWos9F4jQItsGaMVNOlEQdW93LciDaEAI-YPSRQfzM';
const PWD='teamsystems2026';
const MC_MAX=20, OPEN_QS=[21,22,23,24,25], OPEN_MAX_EACH=10;
const OPEN_MAX=OPEN_QS.length*OPEN_MAX_EACH; // 50
const TOTAL=MC_MAX+OPEN_MAX; // 70
let data=[], grades={};

function auth(){
  if(document.getElementById('pwd').value===PWD){
    document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block';
    try{const g=localStorage.getItem('og');if(g)grades=JSON.parse(g);}catch(e){}
    load();
  }else{
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';
  }
}

async function load(){
  document.getElementById('tbl').innerHTML='<div class="spinner"></div>';
  try{
    const r=await fetch(SUPA+'/rest/v1/results?select=*&order=submitted_at.desc',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    data=await r.json();
    render();
    document.getElementById('refresh-time').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){document.getElementById('tbl').innerHTML='<div class="empty">Could not load results.</div>';}
}

function save(){try{localStorage.setItem('og',JSON.stringify(grades));}catch(e){}}

function openTotal(rid){
  if(!grades[rid])return null;
  const vals=OPEN_QS.map(q=>grades[rid][q]);
  if(vals.some(v=>v===undefined))return null;
  return vals.reduce((a,b)=>a+b,0);
}

function finalScore(r){const ot=openTotal(r.id);return ot===null?null:(r.score_mc||0)+ot;}
function finalPct(r){const fs=finalScore(r);return fs===null?null:Math.round(fs/TOTAL*100);}
function fullyGraded(rid){return grades[rid]&&OPEN_QS.every(q=>grades[rid][q]!==undefined);}

function gradeLabel(p){
  if(p===null)return['Pending','pending'];
  if(p>=90)return['Excellent','ex'];
  if(p>=75)return['Good','go'];
  if(p>=60)return['Satisfactory','sa'];
  return['Needs improvement','ni'];
}

function barColor(p){return p>=75?'#1D9E75':p>=60?'#EF9F27':'#e74c3c';}

function render(){
  const ungraded=data.some(r=>!fullyGraded(r.id));
  document.getElementById('notice').style.display=ungraded&&data.length?'block':'none';

  if(!data.length){
    document.getElementById('stats').innerHTML='';
    document.getElementById('tbl').innerHTML='<div class="empty">No submissions yet. Share the exam link with your students!</div>';
    return;
  }

  const graded=data.filter(r=>finalPct(r)!==null);
  const avgMC=Math.round(data.reduce((s,r)=>s+(r.percentage||0),0)/data.length);
  const avgFinal=graded.length?Math.round(graded.reduce((s,r)=>s+finalPct(r),0)/graded.length):null;
  const passed=graded.filter(r=>finalPct(r)>=60).length;

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Submissions</div><div class="stat-val">${data.length}</div></div>
    <div class="stat"><div class="stat-lbl">MC average</div><div class="stat-val">${avgMC}%</div></div>
    <div class="stat"><div class="stat-lbl">Final average</div><div class="stat-val green">${avgFinal!==null?avgFinal+'%':'—'}</div></div>
    <div class="stat"><div class="stat-lbl">Pass rate</div><div class="stat-val">${graded.length?Math.round(passed/graded.length*100)+'%':'—'}</div></div>
    <div class="stat"><div class="stat-lbl">Graded</div><div class="stat-val">${graded.length}/${data.length}</div></div>`;

  const rows=data.map((r,i)=>{
    const fp=finalPct(r), fs=finalScore(r);
    const [g,cls]=gradeLabel(fp);
    const dt=new Date(r.submitted_at).toLocaleString([],{dateStyle:'short',timeStyle:'short'});
    const finalCell=fs!==null?`<strong>${fs}/${TOTAL}</strong> <span style="font-size:12px;color:#aaa;">(${fp}%)</span>`:`<span style="color:#aaa;font-size:13px;">needs grading</span>`;
    const gradeCell=fullyGraded(r.id)?`<span class="pill ${cls}">${g}</span>`:`<span class="dot"></span><span class="pill pending">Ungraded</span>`;
    return `<tr>
      <td><strong>${r.student_name}</strong></td>
      <td>${r.score_mc}/${MC_MAX}</td>
      <td>${finalCell}</td>
      <td>${gradeCell}</td>
      <td style="color:#aaa;font-size:13px;">${dt}</td>
      <td><button class="btn sm" onclick="toggle('p${i}')">Grade</button></td>
    </tr>
    <tr style="background:transparent;"><td colspan="6" style="padding:0 8px 8px;"><div class="panel" id="p${i}">${buildPanel(r)}</div></td></tr>`;
  }).join('');

  document.getElementById('tbl').innerHTML=`<table>
    <thead><tr><th>Student</th><th>MC</th><th>Final score</th><th>Grade</th><th>Submitted</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function buildPanel(r){
  const rid=r.id;
  if(!grades[rid])grades[rid]={};
  // answers can be array or object — normalise to array
  const rawAns=r.answers||[];
  const ansArr=Array.isArray(rawAns)?rawAns:Object.values(rawAns);

  let h='<div class="sec-title">Section A — Multiple choice</div>';
  ansArr.filter(a=>a.type==='mc').forEach(a=>{
    const b=a.correct?'<span class="br ok">✓</span>':'<span class="br no">✗ '+a.correctAnswer+'</span>';
    h+=`<div class="ans-row"><div class="ans-q">Q${a.qnum}: ${a.question}${b}</div><div class="ans-a">${a.answer||'(not answered)'}</div></div>`;
  });

  h+='<div class="sec-title">Section B — Open answers &nbsp;<span style="font-weight:400;color:#aaa;">(grade each question 0–10)</span></div>';
  const openAnswers=ansArr.filter(a=>a.type==='open');
  OPEN_QS.forEach((qnum,oi)=>{
    const a=openAnswers[oi];
    const answered=a&&a.answer&&a.answer!=='(skipped)';
    const cur=grades[rid][qnum]!==undefined?grades[rid][qnum]:'';
    const badge=answered?'<span class="br op">answered</span>':'<span class="br sk">skipped</span>';
    h+=`<div class="ans-row">
      <div class="ans-q">Q${qnum}: ${a?a.question:''}${badge}</div>
      <div class="ans-a">${answered?a.answer:'—'}</div>
      <div class="grade-row">
        <label>Score:</label>
        <input type="number" class="si" min="0" max="10" value="${cur}" placeholder="—"
          id="gi-${rid}-${qnum}"
          oninput="updateGrade('${rid}',${qnum},this.value)"
          ${!answered?'disabled title="Student skipped this question"':''}/>
        <span style="font-size:13px;color:#aaa;">/ 10</span>
        <span class="flash" id="fl-${rid}-${qnum}">saved</span>
      </div>
    </div>`;
  });

  // score summary
  const ot=openTotal(rid), mc=r.score_mc||0;
  const fs=ot!==null?mc+ot:null, fp=fs!==null?Math.round(fs/TOTAL*100):null;
  const [g,cls]=gradeLabel(fp);

  h+=`<div class="score-box" id="sb-${rid}">
    <div class="score-grid">
      <div>MC: <strong>${mc}/${MC_MAX}</strong></div>
      <div>Open: <strong id="ot-${rid}">${ot!==null?ot+'/'+OPEN_MAX:'?/'+OPEN_MAX}</strong></div>
      <div>Total: <strong id="fs-${rid}">${fs!==null?fs+'/'+TOTAL:'?/'+TOTAL}</strong></div>
    </div>
    <div class="bar-row">
      <div class="bar-bg"><div class="bar-fill" id="bf-${rid}" style="width:${fp||0}%;background:${fp?barColor(fp):'#e8e8e0'};"></div></div>
      <div class="bar-pct" id="bp-${rid}">${fp!==null?fp+'%':'—'}</div>
    </div>
    <div class="save-row">
      <span style="font-size:13px;color:#888;">Grade:</span>
      <span class="pill ${cls}" id="fg-${rid}">${g}</span>
      <button class="btn blue sm" id="savebtn-${rid}" onclick="saveToDB('${rid}')" ${fs===null?'disabled':''}>Save to database</button>
      <span style="font-size:12px;color:#1D9E75;display:none;" id="dbf-${rid}">✓ Saved!</span>
    </div>
  </div>`;

  return h;
}

function updateGrade(rid,qnum,val){
  if(!grades[rid])grades[rid]={};
  const n=val===''?undefined:Math.min(10,Math.max(0,parseInt(val)||0));
  if(n===undefined)delete grades[rid][qnum];
  else grades[rid][qnum]=n;
  save();
  const fl=document.getElementById('fl-'+rid+'-'+qnum);
  if(fl&&n!==undefined){fl.style.display='inline';setTimeout(()=>fl.style.display='none',1200);}
  refreshScoreBox(rid);
}

function refreshScoreBox(rid){
  const r=data.find(d=>d.id===rid); if(!r)return;
  const ot=openTotal(rid), mc=r.score_mc||0;
  const fs=ot!==null?mc+ot:null, fp=fs!==null?Math.round(fs/TOTAL*100):null;
  const [g,cls]=gradeLabel(fp);
  const otEl=document.getElementById('ot-'+rid);
  const fsEl=document.getElementById('fs-'+rid);
  const bfEl=document.getElementById('bf-'+rid);
  const bpEl=document.getElementById('bp-'+rid);
  const fgEl=document.getElementById('fg-'+rid);
  const sbBtn=document.getElementById('savebtn-'+rid);
  if(otEl)otEl.textContent=ot!==null?ot+'/'+OPEN_MAX:'?/'+OPEN_MAX;
  if(fsEl)fsEl.textContent=fs!==null?fs+'/'+TOTAL:'?/'+TOTAL;
  if(bfEl){bfEl.style.width=(fp||0)+'%';bfEl.style.background=fp?barColor(fp):'#e8e8e0';}
  if(bpEl)bpEl.textContent=fp!==null?fp+'%':'—';
  if(fgEl){fgEl.textContent=g;fgEl.className='pill '+cls;}
  if(sbBtn)sbBtn.disabled=fs===null;
}

async function saveToDB(rid){
  const r=data.find(d=>d.id===rid); if(!r)return;
  const ot=openTotal(rid), fs=finalScore(r), fp=finalPct(r);
  if(fs===null){alert('Please grade all 5 open questions first.');return;}
  try{
    const res=await fetch(SUPA+'/rest/v1/results?id=eq.'+rid,{
      method:'PATCH',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({open_score:ot,final_score:fs,final_percentage:fp})
    });
    const el=document.getElementById('dbf-'+rid);
    if(el){el.style.display='inline';setTimeout(()=>el.style.display='none',3000);}
    load();
  }catch(e){alert('Could not save. Check your connection.');}
}

function toggle(id){document.getElementById(id).classList.toggle('open');}

function exportCSV(){
  if(!data.length)return;
  let csv='Student,MC Score,MC%,Open Score,Final Score,Final%,Grade,Submitted\n';
  data.forEach(r=>{
    const ot=openTotal(r.id), fs=finalScore(r), fp=finalPct(r);
    const[g]=gradeLabel(fp);
    csv+=`"${r.student_name}",${r.score_mc}/${MC_MAX},${r.percentage}%,${ot!==null?ot+'/'+OPEN_MAX:'ungraded'},${fs!==null?fs+'/'+TOTAL:'ungraded'},${fp!==null?fp+'%':'ungraded'},"${g}","${new Date(r.submitted_at).toLocaleString()}"\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='exam-results-graded.csv';a.click();
}
</script>
</body>
</html>
